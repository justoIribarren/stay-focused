<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="title">Stay Focused!</title>
    <!-- <link rel="icon" href="./assets/apple.png"> -->
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/8c02d787f0.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="page__container">

        <header class="header">

            <div class="logo icon">
                <a href="#section__info"><svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.99 35.36">
                    <defs><style>.cls-1{fill:#cbb4b7;}</style></defs><path class="cls-1" d="M25.84,12.09a12.46,12.46,0,0,0-4.38.81,7.73,7.73,0,0,1,6-5.08A.75.75,0,0,0,28.12,7v0a.85.85,0,0,0-1-.6h0a9.31,9.31,0,0,0-7.49,6.77,13.1,13.1,0,0,0-5-1c-6.28,0-11.37,4.48-11.36,10v0C3.2,27,7.75,41.69,14.56,41.69a12.36,12.36,0,0,0,5.64-1.33,12.23,12.23,0,0,0,5.64,1.33C32.65,41.69,37.2,27,37.2,22.1,37.2,16.6,32.13,12.13,25.84,12.09Zm-9.17,5.08c-2.36-.37-4.21-.15-5.56.81A6.25,6.25,0,0,0,8.67,22.4a.71.71,0,0,1-.73.68l-.19,0A.72.72,0,0,1,7,22.42a1,1,0,0,1,0-.17,7.74,7.74,0,0,1,3.11-5.52,9.49,9.49,0,0,1,6.9-1.1.75.75,0,0,1,.68.85v0a.88.88,0,0,1-1,.66Z" transform="translate(-3.2 -6.33)"/>
                </svg></a>
            </div>

            <nav class="nav">
                <button class="nav__link nav__active" id="pomodoro">Pomodoro</button>
                <button class="nav__link" id="break">Short Break</button>
                <button class="nav__link" id="pause">Long Pause</button>
            </nav>

            <button class="settings icon"><i class="fa-solid fa-gear"></i></button>
            
        </header>

        <main class="main">
            
            <div class="timer">
                
                <section class="sections">
                    <div class="section__timer timer">

                        <p class="timer__countdown timer__active" id="pomodoro">25:00</p>

                        <p class="timer__countdown" id="break">05:00</p>

                        <p class="timer__countdown" id="pause">20:00</p>

                        <div class="timer__buttons">
                            <button class="start">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <button class="pause">
                                <svg id="Capa_1" data-name="Capa 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11.68 13.63"><path class="cls-1" d="M2.11.19A1.94,1.94,0,0,0,.16,2.13v9.74a1.95,1.95,0,0,0,3.89,0V2.13A1.94,1.94,0,0,0,2.11.19Zm7.78,0A1.94,1.94,0,0,0,8,2.13v9.74a1.95,1.95,0,0,0,3.89,0V2.13A1.94,1.94,0,0,0,9.89.19Z" transform="translate(-0.16 -0.19)"/></svg>
                            </button>
                        </div>

                    </div>
                </section>

                <span class="scrolldown"><i class="fa-solid fa-angle-down"></i></span>

            </div>
            
        </main>
        
        <aside class="aside">
            <div class="aside__container">
                
                <div class="aside__content aside__content--header">
                    <span>Settings</span>
                    <i class="fa-solid fa-xmark close"></i>
                </div>
                
                <div class="aside__content aside__content--time">
                    
                    <span class="title">
                        <i class="fa-regular fa-clock"></i>TIMER
                    </span>

                    <div class="config">
                        
                        <p>Time</p>
                        
                        <div class="config__option">

                            <div class="time__input">
                                <label>Pomodoro</label>
                                <input type="number" class="timer__minutes" min="0" step="1" value="25" id="pomodoro">
                            </div>

                            <div class="time__input">
                                <label>Short Break</label>
                                <input type="number" class="break__minutes" min="0" step="1" value="5" id="break">
                            </div>

                            <div class="time__input">
                                <label>Long Pause</label>
                                <input type="number" class="longpause__minutes" min="0" step="1" value="20" id="pause">
                            </div>

                        </div>

                    </div>


                    <div class="config config__option">
                        <p class="">Long Pause Interval</p>
                        <input type="number" class="interval" min="0" step="1" value="4">
                    </div>

                    <div class="config config__option">
                        <p class="">Pomodoro Sessions</p>
                        <input type="number" class="sessions" min="0" step="1" value="4">
                    </div>

                    <div class="config config__option">
                        <p class="">Automatically start</p>
                        <input type="checkbox" class="autostart" id="switch" checked>
                        <label for="switch" class="lbl-switch"></label>
                    </div>

                </div>
                </div>
                
            </div>
        </aside>


    </div>

    <script src="./js/index.js" ></script>
    <script src="./js/timer.js"></script>
    
    
</body>

</html>
